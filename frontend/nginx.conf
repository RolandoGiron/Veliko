server {
    listen 80;
    root /usr/share/nginx/html;

    # Content-hashed build assets — immutable, cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing.
    location / {
        try_files $uri /index.html;
    }

    # Entry document — never cache, so new deploys appear immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
